<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .frame{fill:#fff;stroke:#9aa3ad;stroke-width:1.5}
      .box{fill:#f4f6f8;stroke:#c2c9d1;stroke-width:1.2}
      .field{fill:#fff;stroke:#b4bcc4;stroke-width:1.2}
      .btn{fill:#e8eef6;stroke:#7d8a99;stroke-width:1.4}
      .t{fill:#3a4250;font-size:14px}
      .tm{fill:#5a636e;font-size:13px}
      .ts{fill:#8a929c;font-size:12px}
      .th{fill:#2b313b;font-size:20px;font-weight:600}
      .ph{fill:#9aa3ad;font-size:13px}
      .ico{fill:none;stroke:#7d8a99;stroke-width:1.6}
    </style>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="719" height="519" fill="#eef1f4"/>
  <text x="20" y="28" class="ts">线框图 01 · 登录界面（Supabase Auth · 简洁专业浅色）</text>

  <!-- login card -->
  <rect class="frame" x="180" y="70" width="360" height="400" rx="10"/>

  <!-- logo / app icon placeholder -->
  <circle cx="360" cy="130" r="26" class="box"/>
  <path d="M349 130 h22 M360 119 v22" class="ico"/>

  <text x="360" y="180" class="th" text-anchor="middle">外卖在线客服助手</text>
  <text x="360" y="204" class="ts" text-anchor="middle">登录后即可使用 AI 客服对话</text>

  <!-- email field -->
  <text x="210" y="244" class="tm">邮箱</text>
  <rect class="field" x="210" y="252" width="300" height="40" rx="6"/>
  <text x="224" y="277" class="ph">you@example.com</text>

  <!-- password field -->
  <text x="210" y="312" class="tm">密码</text>
  <rect class="field" x="210" y="320" width="300" height="40" rx="6"/>
  <text x="224" y="345" class="ph">••••••••</text>
  <!-- eye toggle -->
  <path d="M486 340 q8 -8 16 0 q-8 8 -16 0 z" class="ico"/>
  <circle cx="494" cy="340" r="2" fill="#7d8a99"/>

  <!-- error line (state) -->
  <text x="210" y="378" class="ts" fill="#b46b6b">⚠ 邮箱或密码错误（错误态示意）</text>

  <!-- login button -->
  <rect class="btn" x="210" y="392" width="300" height="44" rx="8"/>
  <text x="360" y="420" class="t" text-anchor="middle" font-weight="600">登 录</text>

  <!-- footer hint -->
  <text x="360" y="456" class="ts" text-anchor="middle">账号由管理员分配 · 忘记密码请联系管理员</text>

  <!-- annotations -->
  <text x="556" y="262" class="ts">① 邮箱密码</text>
  <text x="556" y="330" class="ts">② 可显隐密码</text>
  <text x="556" y="404" class="ts">③ 调 Supabase</text>
  <text x="556" y="420" class="ts">   成功→拿 JWT</text>
</svg>
